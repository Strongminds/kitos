apiVersion: apps/v1
kind: Deployment
metadata:
  name: pubsub-api
  namespace: kitos
  labels:
    app.kubernetes.io/name: pubsub-api
    app.kubernetes.io/part-of: kitos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pubsub-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pubsub-api
        app.kubernetes.io/part-of: kitos
    spec:
      containers:
        - name: pubsub-api
          image: pubsub-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pubsub-api-config
            - secretRef:
                name: pubsub-api-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
