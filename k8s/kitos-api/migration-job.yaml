apiVersion: batch/v1
kind: Job
metadata:
  name: kitos-api-migration
  namespace: kitos
  labels:
    app.kubernetes.io/name: kitos-api
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: kitos
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kitos-api
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: kitos-api:latest
          command: ["dotnet", "Presentation.Web.dll", "--migrate-and-exit"]
          envFrom:
            - configMapRef:
                name: kitos-api-config
            - secretRef:
                name: kitos-api-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
