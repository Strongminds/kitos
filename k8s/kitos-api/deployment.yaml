apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitos-api
  namespace: kitos
  labels:
    app.kubernetes.io/name: kitos-api
    app.kubernetes.io/part-of: kitos
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kitos-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kitos-api
        app.kubernetes.io/part-of: kitos
    spec:
      containers:
        - name: kitos-api
          image: kitos-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kitos-api-config
            - secretRef:
                name: kitos-api-secrets
          volumeMounts:
            - name: sso-certificates
              mountPath: /etc/ssl/certs
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: sso-certificates
          secret:
            secretName: kitos-sso-certificates
            items:
              - key: sso-sp.pfx
                path: sso-sp.pfx
              - key: sts.pfx
                path: sts.pfx
              - key: sts-org.pfx
                path: sts-org.pfx
