apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: kitos
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: kitos
data:
  init-databases.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE kitos;
      CREATE DATABASE kitos_hangfire;
      CREATE DATABASE kitos_pubsub;
    EOSQL
